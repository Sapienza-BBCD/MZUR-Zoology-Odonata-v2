<style>

html,
body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
    color: #222;
    background: white;
}

/*
 * Fixed upper band containing the gallery title and navigation controls.
 */
.fixed-header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    min-height: 118px;
    background: white;
    border-bottom: 1px solid #ddd;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    box-sizing: border-box;
    padding: 12px 20px 10px;
}

.home-icon {
    position: absolute;
    top: 18px;
    left: 20px;
    width: 42px;
    height: 42px;
    object-fit: contain;
    cursor: pointer;
    transition: transform 0.2s ease, opacity 0.2s ease;
}

@media (hover: hover) {
    .home-icon:hover {
        transform: scale(1.08);
        opacity: 0.82;
    }
}

h1 {
    text-align: center;
    font-style: italic;
    color: #821a33;
    margin: 4px 0 10px;
    font-size: clamp(1.9rem, 3.4vw, 2.5rem);
    font-weight: 600;
    line-height: 1.15;
}

.navigation {
    text-align: center;
    margin: 0;
}

.navigation a {
    display: inline-block;
    padding: 8px 14px;
    margin: 3px;
    background: #821a33;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: background-color 0.2s ease, transform 0.15s ease;
}

@media (hover: hover) {
    .navigation a:hover {
        background: #a32646;
        transform: translateY(-1px);
    }
}

/*
 * Scrollable image gallery.
 */
.scroll-area {
    position: fixed;
    top: 118px;
    bottom: 78px;
    left: 0;
    right: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
}

.gallery {
    width: min(1300px, 96%);
    margin: 0 auto;
    padding: 28px 10px 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 18px;
    box-sizing: border-box;
}

.gallery-item {
    width: 180px;
    text-align: center;
    padding: 8px;
    box-sizing: border-box;
    border-radius: 8px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
}

@media (hover: hover) {
    .gallery-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }
}

.gallery-item a {
    color: #222;
    text-decoration: none;
}

.gallery-item img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    border: 1px solid #ccc;
    background: #fafafa;
}

.filename {
    margin-top: 6px;
    font-size: 13px;
    overflow-wrap: anywhere;
}

.empty-gallery {
    width: 100%;
    margin: 40px auto;
    text-align: center;
    color: #821a33;
    font-size: 18px;
}

/*
 * Fixed lower band containing the institutional logos.
 */
.fixed-footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.98);
    border-top: 1px solid #ddd;
    box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
    padding: 8px 20px;
    box-sizing: border-box;
}

.logos {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 30px;
    box-sizing: border-box;
}

.logos img {
    display: block;
    width: auto;
    height: 58px;
    max-width: min(240px, 40vw);
    object-fit: contain;
    flex: 0 0 auto;
}

.logos img:first-child {
    margin-right: auto;
}

.logos img:last-child {
    margin-left: auto;
}

@media (max-width: 700px) {

    .fixed-header {
        min-height: 108px;
        padding: 10px 12px 8px;
    }

    .home-icon {
        width: 34px;
        height: 34px;
        top: 14px;
        left: 14px;
    }

    h1 {
        font-size: 30px;
    }

    .scroll-area {
        top: 108px;
        bottom: 66px;
    }

    .gallery-item {
        width: 150px;
        padding: 6px;
    }

    .gallery-item img {
        width: 138px;
        height: 138px;
    }

    .fixed-footer {
        padding: 7px 12px;
    }

    .logos {
        gap: 16px;
    }

    .logos img {
        height: 44px;
        max-width: 42vw;
    }
}

</style>
</head>
