
    <!DOCTYPE html>
    <html lang="en">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">

        <title>G.M. Carchini | C. Utzeri</title>

        <style>

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                font-family: Arial, Helvetica, sans-serif;
                color: #222;
                background: white;
            }

            /*
             * Fixed upper band containing the Home icon and identifier name.
             */
            .fixed-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
                min-height: 105px;
                background: white;
                border-bottom: 1px solid #ddd;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                box-sizing: border-box;
                padding: 18px 70px 12px;
            }

            .home-icon {

                position: absolute;

                top: 18px;

                left: 20px;

                width: 42px;

                height: 42px;

                object-fit: contain;

                cursor: pointer;

                transition: transform 0.2s ease, opacity 0.2s ease;

            }


            @media (hover: hover) {
                .home-icon:hover {
                    transform: scale(1.08);
                    opacity: 0.82;
                }
            }

            h1 {
                margin: 8px 0 0;
                text-align: center;
                color: #821a33;
                font-size: clamp(2rem, 3.6vw, 2.7rem);
                font-weight: 600;
                line-height: 1.15;
            }

            /*
             * Only the identifier summary table scrolls.
             */
            .scroll-area {
                position: fixed;
                top: 105px;
                bottom: 78px;
                left: 0;
                right: 0;
                overflow-y: auto;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .container {
                width: min(1150px, 94%);
                margin: 0 auto;
                text-align: center;
                padding: 28px 10px 40px;
                box-sizing: border-box;
            }

            .data-table {
                width: 90%;
                margin: 25px auto;
                border-collapse: collapse;
            }

            .data-table th,
            .data-table td {
                border: 1px solid #ddd;
                padding: 9px;
            }

            .data-table th {
                background: #f3f3f3;
                color: #821a33;
                font-weight: 600;
            }

            /*
             * Fixed lower band containing the institutional logos.
             */
            .fixed-footer {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1000;
                background: rgba(255, 255, 255, 0.98);
                border-top: 1px solid #ddd;
                box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
                padding: 8px 20px;
                box-sizing: border-box;
            }

            .logos {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 30px;
                box-sizing: border-box;
            }

            .logos img {
                display: block;
                width: auto;
                height: 58px;
                max-width: min(240px, 40vw);
                object-fit: contain;
                flex: 0 0 auto;
            }

            .logos img:first-child {
                margin-right: auto;
            }

            .logos img:last-child {
                margin-left: auto;
            }

            @media (max-width: 700px) {

                .fixed-header {
                    min-height: 90px;
                    padding: 14px 55px 10px;
                }

                .home-icon {
                    top: 16px;
                    left: 14px;
                    width: 36px;
                    height: 36px;
                }

                h1 {
                    font-size: clamp(1.75rem, 8vw, 2.2rem);
                    padding: 0 8px;
                }

                .scroll-area {
                    top: 90px;
                    bottom: 66px;
                }

                .fixed-footer {
                    padding: 7px 12px;
                }

                .logos {
                    gap: 16px;
                }

                .logos img {
                    height: 44px;
                    max-width: 42vw;
                }

                .data-table {
                    width: 100%;
                    font-size: 14px;
                }

                .data-table th,
                .data-table td {
                    padding: 8px 6px;
                    overflow-wrap: anywhere;
                }
            }

        </style>

    </head>

    <body>

        <!-- Fixed upper band -->
        <header class="fixed-header">

            <a href="index.html">
                <img
                    src="home.png"
                    alt="Home"
                    class="home-icon"
                >
            </a>

            <h1>G.M. Carchini | C. Utzeri</h1>

        </header>

        <!-- Scrollable identifier summary -->
        <main class="scroll-area">

            <div class="container">

                <h2>Data</h2>

                <table class="data-table">

                    <tr>
                        <th>Species</th>
                        <th>Continent</th>
                        <th>Country</th>
                        <th>Locality</th>
                        <th>Individuals</th>
                    </tr>

                    

                    <tr>
                        <td><em>Anax imperator Leach, 1815</em></td>
                        <td>Europe</td>
                        <td>Italy</td>
                        <td>Spelronga, Lago Lungo (LT)</td>
                        <td>3</td>
                    </tr>

                    

                    <tr>
                        <td><em>Sympetrum striolatum (Charpentier, 1840)</em></td>
                        <td>Europe</td>
                        <td>Italy</td>
                        <td>Spelronga, Lago Lungo (LT)</td>
                        <td>1</td>
                    </tr>

                    

                </table>

            </div>

        </main>

        <!-- Fixed lower band -->
        <footer class="fixed-footer">

            <div class="logos">

                <img src="logo1.png" alt="Left Logo">

                <img src="logo2.png" alt="Right Logo">

            </div>

        </footer>

    </body>

    </html>
