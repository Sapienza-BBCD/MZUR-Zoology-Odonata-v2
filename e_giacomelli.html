
    <!DOCTYPE html>
    <html lang="en">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">

        <title>E. Giacomelli</title>

        <style>

            html,
            body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden;
                font-family: Arial, Helvetica, sans-serif;
                color: #222;
                background: white;
            }

            /*
             * Fixed upper band containing the Home icon and identifier name.
             */
            .fixed-header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                z-index: 1000;
                min-height: 105px;
                background: white;
                border-bottom: 1px solid #ddd;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
                box-sizing: border-box;
                padding: 18px 70px 12px;
            }

            .home-icon {
                position: absolute;
                top: 20px;
                left: 20px;
                width: 40px;
                height: 40px;
                object-fit: contain;
            }

            h1 {
                margin: 8px 0 0;
                text-align: center;
                color: #821a33;
                font-size: 42px;
            }

            /*
             * Only the identifier summary table scrolls.
             */
            .scroll-area {
                position: fixed;
                top: 105px;
                bottom: 92px;
                left: 0;
                right: 0;
                overflow-y: auto;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }

            .container {
                width: min(1150px, 94%);
                margin: 0 auto;
                text-align: center;
                padding: 28px 10px 40px;
                box-sizing: border-box;
            }

            .data-table {
                width: 90%;
                margin: 25px auto;
                border-collapse: collapse;
            }

            .data-table th,
            .data-table td {
                border: 1px solid #ddd;
                padding: 9px;
            }

            .data-table th {
                background: #f3f3f3;
            }

            /*
             * Fixed lower band containing the institutional logos.
             */
            .fixed-footer {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 1000;
                background: white;
                border-top: 1px solid #ddd;
                box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
                padding: 10px 24px;
                box-sizing: border-box;
            }

            .logos {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: min(1200px, 96%);
                margin: 0 auto;
            }

            .logos img {
                width: 150px;
                max-height: 65px;
                object-fit: contain;
            }

            @media (max-width: 700px) {

                .fixed-header {
                    min-height: 90px;
                    padding: 14px 55px 10px;
                }

                .home-icon {
                    width: 34px;
                    height: 34px;
                    top: 16px;
                    left: 14px;
                }

                h1 {
                    font-size: 30px;
                }

                .scroll-area {
                    top: 90px;
                    bottom: 80px;
                }

                .logos img {
                    width: 120px;
                    max-height: 52px;
                }

                .data-table {
                    width: 100%;
                    font-size: 14px;
                }
            }

        </style>

    </head>

    <body>

        <!-- Fixed upper band -->
        <header class="fixed-header">

            <a href="index.html">
                <img
                    src="home.png"
                    alt="Home"
                    class="home-icon"
                >
            </a>

            <h1>E. Giacomelli</h1>

        </header>

        <!-- Scrollable identifier summary -->
        <main class="scroll-area">

            <div class="container">

                <h2>Data</h2>

                <table class="data-table">

                    <tr>
                        <th>Species</th>
                        <th>Continent</th>
                        <th>Country</th>
                        <th>Locality</th>
                        <th>Individuals</th>
                    </tr>

                    

                    <tr>
                        <td><em>Aeshna cyanea (Müller, 1764)</em></td>
                        <td>Europe</td>
                        <td>Italy</td>
                        <td>Roma, EUR, Vasche di lavatoio</td>
                        <td>1</td>
                    </tr>

                    

                </table>

            </div>

        </main>

        <!-- Fixed lower band -->
        <footer class="fixed-footer">

            <div class="logos">

                <img src="logo1.png" alt="Left Logo">

                <img src="logo2.png" alt="Right Logo">

            </div>

        </footer>

    </body>

    </html>
