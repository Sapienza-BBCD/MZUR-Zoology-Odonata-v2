
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Catalog based on GBIF dataset</title>

    <style>

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: white;
            color: #222;
        }

        /*
         * Fixed upper band containing the Home icon and catalog title.
         */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            min-height: 105px;
            box-sizing: border-box;
        }

        /*
         * Scrollable catalog controls between the fixed header and footer.
         */
        .scroll-area {
            position: fixed;
            top: 105px;
            bottom: 85px;
            left: 0;
            right: 0;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            text-align: center;
            padding: 35px 20px;
        }

        .box {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 24px;
            border: 2px solid #000;
            margin: 5px;
            background-color: #600;
            color: #FFF;
        }

        .dropdown {
            width: 60px;
            font-size: 20px;
        }

        button {
            font-size: 24px;
            background-color: #821a33;
            color: white;
            padding: 15px 25px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            background-color: #c54c00;
        }

        .fixed-footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: white;
            border-top: 1px solid #ddd;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
            padding: 10px 24px;
            box-sizing: border-box;
        }

        .logos {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: min(1200px, 96%);
            margin: 0 auto;
        }

        .logos img {
            width: 178.5px;
            height: 47px;
            object-fit: contain;
        }

        .home-icon {
            width: 40px;
            height: auto;
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
        }

        #result {
            font-size: 20px;
            color: red;
        }

        h2 {
            color: #821a33;
            font-size: 54px;
            text-align: center;
            margin: 22px 70px 12px;
        }

        @media (max-width: 700px) {
            .fixed-header {
                min-height: 90px;
            }

            .scroll-area {
                top: 90px;
                bottom: 76px;
            }

            h2 {
                font-size: 38px;
                margin-top: 22px;
            }

            .home-icon {
                width: 34px;
                top: 16px;
                left: 14px;
            }

            .logos img {
                width: 130px;
                height: auto;
                max-height: 50px;
            }
        }

    </style>

</head>
